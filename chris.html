<head>

<title>Chris Fanelli | Sales Manager – Gear Six Auto Parts</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #c8c8c8;
  font-family: 'Open Sans', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 20px 0 40px;
}

.card {
  width: 100%; max-width: 420px;
  border-radius: 8px;
  overflow: visible;
  box-shadow: 0 10px 32px rgba(0,0,0,0.45), 0 2px 6px rgba(0,0,0,0.2);
  background: #ececec;
  border: 1px solid #999;
}

/* ═══════════════════════════════════
   HEADER
═══════════════════════════════════ */
.card-header {
  border-radius: 7px 7px 0 0;
  overflow: hidden;
  position: relative;
  background:
    linear-gradient(180deg,
      #0d0d0d 0%,
      #1c1c1c 25%,
      #2a1010 60%,
      #1a0808 85%,
      #0a0a0a 100%
    );
  padding: 14px 16px 10px;
}

/* fine brushed-metal horizontal lines */
.card-header::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px,
    rgba(255,255,255,0.018) 1px,
    transparent 2px,
    transparent 5px
  );
  pointer-events: none;
}

/* bottom red accent stripe */
.card-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg,
    transparent 0%,
    #8b0000 10%,
    #c0392b 35%,
    #e74c3c 50%,
    #c0392b 65%,
    #8b0000 90%,
    transparent 100%
  );
}

/* ── logo badge ── */
.logo-badge {
  position: relative;
  margin: 0 auto;
  max-width: 290px;
  background: linear-gradient(165deg,
    #d8d8d8 0%,
    #b0b0b0 18%,
    #e2e2e2 38%,
    #a8a8a8 55%,
    #cecece 72%,
    #b8b8b8 100%
  );
  border: 1px solid #787878;
  border-radius: 4px;
  padding: 7px 16px;
  display: flex; align-items: center; justify-content: center;
  box-shadow:
    0 3px 10px rgba(0,0,0,0.7),
    0 1px 0 rgba(255,255,255,0.35) inset,
    0 -1px 0 rgba(0,0,0,0.3) inset;
}
.logo-badge img {
  width: 100%; max-width: 220px;
  height: auto; display: block;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25));
}

/* rivets */
.rivet {
  position: absolute;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 35%, #d0d0d0 0%, #888 55%, #444 100%);
  box-shadow: 0 1px 2px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.3);
}
.rivet::after {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 2px; height: 2px;
  border-radius: 50%;
  background: rgba(0,0,0,0.45);
}
.rivet.tl { top: 4px; left: 4px; }
.rivet.tr { top: 4px; right: 4px; }
.rivet.bl { bottom: 4px; left: 4px; }
.rivet.br { bottom: 4px; right: 4px; }

/* subtle red ambient glow behind plate */
.badge-glow {
  position: absolute; inset: -6px;
  background: radial-gradient(ellipse at 50% 50%,
    rgba(180,20,20,0.18) 0%,
    transparent 70%
  );
  pointer-events: none;
  border-radius: 6px;
}

/* ═══════════════════════════════════
   PROFILE PHOTO
═══════════════════════════════════ */
.profile-photo-wrap {
  display: flex; justify-content: center;
  margin-top: -44px;
  position: relative; z-index: 2;
}
.profile-photo {
  width: 88px; height: 88px;
  border-radius: 50%;
  border: 3px solid #b8b8b8;
  background: #ccc;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  box-shadow:
    0 4px 14px rgba(0,0,0,0.45),
    0 0 0 1px rgba(255,255,255,0.55);
}
.profile-photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.profile-photo .initials { font-size: 32px; font-weight: 700; color: #8b0000; font-family: 'Oswald', sans-serif; }

/* ═══════════════════════════════════
   CARD BODY
═══════════════════════════════════ */
.card-body {
  padding: 8px 18px 16px;
  text-align: center;
  /* subtle concrete/linen texture */
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.012) 2px,
      rgba(0,0,0,0.012) 3px
    ),
    #ebebeb;
}

.person-name {
  font-family: 'Oswald', sans-serif;
  font-size: 21px; font-weight: 700;
  color: #111;
  text-transform: uppercase; letter-spacing: 2px;
  margin-top: 10px; margin-bottom: 2px;
}
.person-title {
  font-size: 11px; color: #9b0000;
  font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
  margin-bottom: 1px;
}
.person-company { font-size: 12px; color: #777; margin-bottom: 16px; }

/* thin divider */
.divider {
  display: flex; align-items: center; gap: 8px;
  margin: 0 0 14px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, #bbb, transparent);
}
.divider-text {
  font-family: 'Oswald', sans-serif;
  font-size: 9px; color: #aaa; letter-spacing: 3px; text-transform: uppercase;
}

.contact-grid {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 10px; margin-bottom: 14px;
}
.contact-item {
  display: flex; flex-direction: column; align-items: center;
  text-decoration: none;
}
.contact-item .icon-circle {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(145deg, #e4e4e4, #c0c0c0);
  border: 1px solid #aaa;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 4px;
  transition: all 0.2s;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.18), -1px -1px 3px rgba(255,255,255,0.85);
}
.contact-item:hover .icon-circle {
  background: linear-gradient(145deg, #8b0000, #c0392b);
  box-shadow: 2px 2px 8px rgba(139,0,0,0.35);
  transform: scale(1.06);
}
.contact-item .icon-circle i { color: #8b0000; font-size: 15px; transition: color 0.2s; }
.contact-item:hover .icon-circle i { color: #fff; }
.contact-item .icon-label { font-size: 9px; font-weight: 600; color: #777; text-transform: uppercase; letter-spacing: 0.5px; }

.save-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  background: linear-gradient(135deg, #7a0000 0%, #c0392b 50%, #7a0000 100%);
  color: #fff; text-decoration: none;
  padding: 11px 28px; border-radius: 28px;
  font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
  margin: 4px 0 14px; width: 84%;
  box-shadow: 0 4px 12px rgba(139,0,0,0.38), inset 0 1px 0 rgba(255,255,255,0.15);
}
.save-btn:hover { background: linear-gradient(135deg, #a00000 0%, #e04030 50%, #a00000 100%); }

.address-section {
  margin: 8px 0; padding: 10px 12px;
  border-top: 1px solid #d8d8d8; border-bottom: 1px solid #d8d8d8;
}
.address-section h3 { font-family: 'Oswald', sans-serif; font-size: 11px; color: #666; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; }
.address-section p { font-size: 12px; color: #777; line-height: 1.5; }
.address-section a { color: #8b0000; text-decoration: none; }

.social-section {
  display: flex; justify-content: center; gap: 10px;
  margin: 10px 0 4px;
}
.social-link {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(145deg, #e4e4e4, #c0c0c0);
  border: 1px solid #aaa;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.18), -1px -1px 3px rgba(255,255,255,0.85);
  display: flex; align-items: center; justify-content: center;
  text-decoration: none; transition: all 0.2s;
}
.social-link:hover { background: linear-gradient(145deg, #8b0000, #c0392b); }
.social-link i { color: #8b0000; font-size: 14px; transition: color 0.2s; }
.social-link:hover i { color: #fff; }

/* ═══════════════════════════════════
   FOOTER
═══════════════════════════════════ */
.card-footer {
  border-radius: 0 0 7px 7px;
  overflow: hidden;
  position: relative;
  background:
    linear-gradient(180deg,
      #0a0a0a 0%,
      #1a0808 20%,
      #2a1010 50%,
      #1c1c1c 78%,
      #0d0d0d 100%
    );
  padding: 10px 16px 14px;
}
.card-footer::before {
  content: '';

  background: repeating-linear-gradient(
    90deg,
    transparent 0px,
    rgba(255,255,255,0.018) 1px,
    transparent 2px,
    transparent 5px
  );
  pointer-events: none;
}
/* top red accent stripe */
.card-footer::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg,
    transparent 0%,
    #8b0000 10%,
    #c0392b 35%,
    #e74c3c 50%,
    #c0392b 65%,
    #8b0000 90%,
    transparent 100%
  );
}
</style>
</head>
